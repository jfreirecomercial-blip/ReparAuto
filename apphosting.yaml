runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://reparauto.pt
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_PROJECT_ID
    value: reparauto-site
    availability:
      - BUILD
      - RUNTIME
