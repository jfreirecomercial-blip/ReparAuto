name: Update Project Dashboard

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/dashboard.html'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/dashboard.html'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate Dashboard
        run: node scripts/generate-dashboard.mjs

      - name: Commit & Push Dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard.html
          git diff-index --quiet HEAD || (git commit -m "chore: auto-update project dashboard [skip ci]" && git push)
